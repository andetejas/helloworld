version: '3.8'

services:
  hello-world:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hello-world-azure
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      APP_VERSION: 1.0.0
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - hello-world-network

networks:
  hello-world-network:
    driver: bridge
